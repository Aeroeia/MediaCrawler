<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据采集中台 - 数据详情</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=__DASHBOARD_ASSET_VERSION__" />
    <script src="/static/dashboard.js?v=__DASHBOARD_ASSET_VERSION__" defer></script>
  </head>
  <body data-dashboard-page="details">
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="page">
      <header class="topbar card">
        <div class="title-block">
          <h1>数据采集中台</h1>
          <p>按关键词、帖子与评论归属查看采集明细</p>
        </div>
        <nav class="top-nav" aria-label="主导航">
          <a class="top-nav-link" href="/overview">数据总览</a>
          <a class="top-nav-link active" href="/details">数据详情</a>
          <a class="top-nav-link" href="/tasks">任务管理</a>
        </nav>
        <div class="toolbar">
          <label for="days-select">时间范围</label>
          <select id="days-select">
            <option value="7">最近 7 天</option>
            <option value="30">最近 30 天</option>
          </select>
          <button id="refresh-btn" type="button">刷新数据</button>
        </div>
      </header>

      <section class="panel-grid full">
        <article class="panel card">
          <div class="panel-head">
            <h2>关键词 Top</h2>
            <span class="chip">来源关键词</span>
          </div>
          <div id="keyword-list" class="keyword-list empty-state">暂无关键词数据</div>
        </article>
      </section>

      <section class="panel-grid full">
        <article class="panel card">
          <div class="panel-head">
            <h2>帖子与评论归属</h2>
            <span id="merged-count" class="chip">0 个帖子</span>
          </div>
          <div class="table-wrap">
            <table class="data-table merged-table">
              <thead>
                <tr>
                  <th>网站</th>
                  <th>帖子 ID</th>
                  <th>标题 / 摘要</th>
                  <th>采集时间</th>
                  <th>已采评论数</th>
                  <th>最新评论时间</th>
                  <th>互动</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="merged-table-body">
                <tr>
                  <td colspan="8" class="empty-state">暂无数据</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="merged-pagination" class="table-pagination hidden">
            <button id="merged-page-prev" class="page-btn" type="button">上一页</button>
            <span id="merged-page-text" class="page-text">第 0 / 0 页</span>
            <button id="merged-page-next" class="page-btn" type="button">下一页</button>
          </div>
        </article>
      </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  </body>
</html>
