<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaCrawler 数据表盘</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=__DASHBOARD_ASSET_VERSION__" />
    <script src="/static/dashboard.js?v=__DASHBOARD_ASSET_VERSION__" defer></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="page">
      <header class="topbar card">
        <div class="title-block">
          <h1>MediaCrawler 数据表盘</h1>
          <p>帖子 + 评论为主口径的跨网站采集分析（MySQL）</p>
        </div>
        <div class="toolbar">
          <label for="days-select">时间范围</label>
          <select id="days-select">
            <option value="7">最近 7 天</option>
            <option value="30">最近 30 天</option>
          </select>
          <button id="refresh-btn" type="button">刷新数据</button>
        </div>
      </header>

      <section class="kpi-grid">
        <article class="kpi-card card primary">
          <h2>总爬取量</h2>
          <div id="total-crawled" class="kpi-value">-</div>
          <p>帖子 + 评论</p>
        </article>
        <article class="kpi-card card accent">
          <h2>今日新增爬取量</h2>
          <div id="today-new-crawled" class="kpi-value">-</div>
          <p>今日帖子 + 今日评论</p>
        </article>
        <article class="kpi-card card">
          <h2>帖子总量</h2>
          <div id="total-contents" class="kpi-value">-</div>
          <p>全网站累计</p>
        </article>
        <article class="kpi-card card">
          <h2>评论总量</h2>
          <div id="total-comments" class="kpi-value">-</div>
          <p>全网站累计</p>
        </article>
        <article class="kpi-card card ghost">
          <h2>创作者总量</h2>
          <div id="total-creators" class="kpi-value">-</div>
          <p>辅助参考</p>
        </article>
      </section>

      <section class="panel-grid two-col">
        <article class="panel card">
          <div class="panel-head">
            <h2>帖子采集趋势</h2>
            <span id="trend-period" class="chip">最近 7 天</span>
          </div>
          <div id="trend-chart" class="trend-chart empty-state">暂无数据</div>
        </article>
        <article class="panel card">
          <div class="panel-head">
            <h2>网站分类统计</h2>
            <span class="chip">每个网站单独分类</span>
          </div>
          <div id="site-classification" class="site-list empty-state">暂无数据</div>
        </article>
      </section>

      <section class="panel-grid full">
        <article class="panel card">
          <div class="panel-head">
            <h2>关键词 Top</h2>
            <span class="chip">来源关键词</span>
          </div>
          <div id="keyword-list" class="keyword-list empty-state">暂无关键词数据</div>
        </article>
      </section>

      <section class="panel-grid full">
        <article class="panel card">
          <div class="panel-head">
            <h2>帖子与评论归属</h2>
            <span id="merged-count" class="chip">0 个帖子</span>
          </div>
          <div class="table-wrap">
            <table class="data-table merged-table">
              <thead>
                <tr>
                  <th>网站</th>
                  <th>帖子 ID</th>
                  <th>标题 / 摘要</th>
                  <th>采集时间</th>
                  <th>已采评论数</th>
                  <th>最新评论时间</th>
                  <th>互动</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="merged-table-body">
                <tr>
                  <td colspan="8" class="empty-state">暂无数据</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="merged-pagination" class="table-pagination hidden">
            <button id="merged-page-prev" class="page-btn" type="button">上一页</button>
            <span id="merged-page-text" class="page-text">第 0 / 0 页</span>
            <button id="merged-page-next" class="page-btn" type="button">下一页</button>
          </div>
        </article>
      </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  </body>
</html>
